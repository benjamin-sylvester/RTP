# RTP Buy Box: single source of truth.
# Read by BOTH the app (underwriting filter) and Cowork (deal triage).
# CONFIRMED by Ben 2026-06-22: Southern NH. 2026-06-29: added the MA SouthCoast corridor
# (Fall River + New Bedford). NH is the home turf (in-state deals are leads even outside a
# named corridor); MA is in-box ONLY for the SouthCoast corridor cities. Floor = 4 units.

version: 2026-06-29
status: confirmed

units:
  min: 4                       # lowered from 5 (Ben, Jun 22) for strong Strafford deals
  max: 34
  preference: ">=15"
  # Count units at the PORTFOLIO/PACKAGE level, not per building. A multi-parcel
  # package (e.g. 3x 3-unit = 9 units) is evaluated on its combined unit count.
  count_basis: package_level

property_class: [B, C]

price:
  min_usd: 500000
  max_usd: 5000000

year_built:
  min: 1940            # avoid pre-war structural risk

strategy:
  - value_add          # below-market rents, reno upside, deferred maintenance
  - on_market
  - off_market

# Multi-state. `states` = where we'll consider a deal at all. `primary_state` is the home
# turf: a primary-state deal that fits size+price is a (borderline) lead even outside a named
# corridor. NON-primary states (MA) are in-box ONLY via a named corridor below — so all-of-MA
# does NOT become leads, just the SouthCoast cities. Routing matches corridors on city+state.
geography:
  states: [NH, MA]
  primary_state: NH
  region: "Southern NH + MA SouthCoast"
  corridors:
    - name: "I-93 / Merrimack Valley"
      state: NH
      markets: [Manchester, Nashua, Derry, Londonderry, Salem]
    - name: "Strafford County"
      state: NH
      markets: [Dover, Rochester, Somersworth, Farmington, Milton]
    - name: "MA SouthCoast"
      state: MA
      markets: [Fall River, New Bedford]

# Scoring weights for the composite 0-100 score (auto_underwriting.score). Sum = 1.00.
scoring_weights:
  cap_rate_stabilized: 0.15      # value-add return at market rents (primary cap lens)
  cap_rate_current: 0.10         # current cash flow. MUST be computed on a normalized expense
                                 # ratio (expense_ratio_default) or VERIFIED actuals (real T-12/
                                 # rent roll) — NEVER the broker's headline NOI. This keeps a
                                 # rosy broker expense ratio from inflating the score (the Nashua trap).
  price_per_unit_vs_market: 0.20
  rent_upside_pct: 0.20
  dscr: 0.15
  unit_count_sweet_spot: 0.10   # peak at 12-20 units
  days_on_market: 0.10

# Coarse triage tiers from the 0-100 score (in-box deals only; out-of-box -> Pass).
# Tier is a sort bucket, never a reject. Read by the scorer, never hardcode.
# watch_min sits in the empirical gap between Ben's hand-No deals (~30) and hand-YES (~42).
tiers:
  priority_min: 65
  watch_min: 40

# Pipeline freshness: a lead is "active" only while recently seen. A lead whose last_seen is
# older than active_lead_days auto-demotes to status 'stale' (stays in the DB as a comp, drops
# off the active pipeline + briefing). Reactivate manually anytime. MLS deals that keep
# reappearing in digests refresh last_seen and stay active on their own.
pipeline:
  active_lead_days: 45          # Ben to confirm; on-market deals can live 60-90d, off-market go quiet faster

# Underwriting assumptions for the quick screen
assumptions:
  expense_ratio_default: 0.475   # 45-50%, refine as data accumulates
  ltv: 0.65
  amortization_years: 30
  reno_per_unit_usd: 10000
  stabilized_occupancy: 0.95
  exit_cap_compression_bps: 25
  dscr_floor: 1.20
  interest_rate: 0.0625          # 30yr fixed for DSCR/debt sizing (Ben, Jun 22). Update quarterly.
  # NOTE: stabilized cap + rent_upside depend on rent_comps (Phase 3, currently empty).
  # Until then the scorer must degrade gracefully (compute current cap, PPU-vs-market, DSCR,
  # unit sweet-spot, DOM) and renormalize weights over available components.
