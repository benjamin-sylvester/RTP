# Per-source ingestion config for RTP's 5 known deal-flow senders.
# MLS exports (structured) parse with pandas via field_map.
# Free-form emails and PDF OMs route to the Claude API parser (parse: ai).
# All five currently land in the Gmail "Deal Flow" label.

sources:

  mlspin:
    display_name: "MLS PIN (Pinergy)"
    from: ["pinergy@mlspin.com"]
    via: ["James Roche", "Sophie Shea"]
    format: html_email          # structured listing data in HTML body
    parse: html
    field_map:
      address: STREET_ADDRESS
      units: NUM_UNITS
      asking_price: LIST_PRICE
      year_built: YR_BUILT
      building_sf: TOTAL_SF
      avg_rent: AVG_RENT
      external_id: MLS_NUMBER

  primemls:
    display_name: "PrimeMLS (Paragon Collaboration Center)"
    from: ["email@paragonmessaging.com"]
    via: ["Justin Porter"]
    format: html_email          # listing previews: address, price, MLS#, sqft
    parse: html
    field_map:
      address: Property Address
      asking_price: Price
      building_sf: SqFt
      external_id: MLS #

  porter:
    display_name: "Justin Porter (Porter Capital REI)"
    from: ["justin@portercapitalrei.com"]
    format: freeform_email      # off-market NH deals, key relationship
    parse: ai

  candor:
    display_name: "Candor Realty / Investment Group"
    from: ["info@candorealty.com"]
    format: newsletter          # mix of real off-market deals and meetup noise
    parse: ai
    notes: "Filter out meetup/event invites; only parse actual listings."

  northeast_pcg:
    display_name: "Northeast PCG"
    from: ["tperun@northeastpcg.com"]
    domains: ["northeastpcg.com"]   # any rep at the firm (e.g. fsaenz@) maps here
    via: ["T. Perun", "F. Saenz"]
    format: offering_memo       # institutional-style OMs (PDF)
    parse: ai

  # ---- added 2026-06-22 after corpus survey (senders found under Deal Flow) ----

  cbrealty:
    display_name: "Coldwell Banker (Sophie Shea, direct)"
    from: ["sophie.shea@cbrealty.com"]
    domains: ["cbrealty.com"]
    format: freeform_email      # direct agent emails (not the Pinergy HTML feed)
    parse: ai
    notes: "Sophie also appears as an MLS-PIN 'via'; this is her direct mail."

  fallriverpm:
    display_name: "Fall River Property Management"
    from: ["lpachon@fallriverpm.com"]
    domains: ["fallriverpm.com"]
    format: flipbook            # off-market MA deals as HTML 'flipbook' attachments
    parse: ai
    notes: "MA/New Bedford off-market; out of state box -> comp_only. Parse HTML attachments."

  bchomebuyers:
    display_name: "BC Home Buyers (Lauren)"
    from: ["lauren@bchomebuyers.com"]
    domains: ["bchomebuyers.com"]
    format: freeform_email      # wholesaler
    parse: ai

  htapartments:
    display_name: "HT Apartments"
    from: ["ssmith@htapartments.com"]
    domains: ["htapartments.com"]
    format: freeform_email
    parse: ai

  self_forward:
    display_name: "Ben (forwarded deals)"
    from: ["ben.sylvester18@gmail.com", "ben@rtprei.com"]
    format: forwarded_email     # original deal embedded in the forwarded body
    parse: ai
    notes: "Ben forwarding a deal to himself; AI parser must unwrap the original sender/source from the forwarded headers in the body."
